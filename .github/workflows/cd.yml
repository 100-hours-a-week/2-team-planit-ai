name: CD - AI (ASG Refresh)

on:
  workflow_run:
    workflows: ["CI - AI"]
    types: [completed]
    branches: [main]

jobs:
  ai-cd:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    concurrency:
      group: cd-ai-main
      cancel-in-progress: false

    env:
      AWS_REGION: ap-northeast-2
      ECR_REPOSITORY: planit-ai
      ASG_NAME: planit-v2-asg-ai
      SSM_PREFIX: /planit/prod/ai
      MIN_HEALTHY_PERCENT: "50"
      INSTANCE_WARMUP: "180"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Access Key 방식으로 AWS 로그인
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install jq
        run: sudo apt-get update -y && sudo apt-get install -y jq

      # 배포 이미지 태그 계산
      - name: Compute image tag
        id: img
        run: |
          HEAD_SHA="${{ github.event.workflow_run.head_sha }}"
          SHORT="${HEAD_SHA:0:7}"
          echo "tag=sha-${SHORT}" >> "$GITHUB_OUTPUT"

      # RunPod → SSM 업데이트
      - name: Update VLLM_BASE_URL in SSM
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
        run: |
          pods=$(curl -fsS --request GET \
            --url "https://rest.runpod.io/v1/pods" \
            --header "Authorization: Bearer ${RUNPOD_API_KEY}")

          pod_id=$(echo "$pods" | jq -r '.[0].id // .[0].pod.id // empty')

          if [ -z "$pod_id" ]; then
            echo "No RunPod found"
            exit 1
          fi

          vllm="https://${pod_id}-8000.proxy.runpod.net"

          aws ssm put-parameter \
            --name "${SSM_PREFIX}/VLLM_BASE_URL" \
            --type SecureString \
            --overwrite \
            --value "$vllm"

          echo "Updated VLLM_BASE_URL"


      # user-data 렌더링
      - name: Render user-data
        id: ud
        run: |
          TAG="${{ steps.img.outputs.tag }}"
          sed "s|{{IMAGE_TAG}}|$TAG|g" resources/user-data.sh > rendered-userdata.sh
          base64 -w 0 rendered-userdata.sh > userdata.b64


      # Launch Template 새 버전 생성
      - name: Create new Launch Template version
        id: lt
        run: |
          LT_ID=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "$ASG_NAME" \
            --query "AutoScalingGroups[0].LaunchTemplate.LaunchTemplateId" \
            --output text)

          CURRENT=$(aws ec2 describe-launch-templates \
            --launch-template-ids "$LT_ID" \
            --query "LaunchTemplates[0].DefaultVersionNumber" \
            --output text)

          NEW=$(aws ec2 create-launch-template-version \
            --launch-template-id "$LT_ID" \
            --source-version "$CURRENT" \
            --version-description "ai:${{ steps.img.outputs.tag }}" \
            --launch-template-data "{\"UserData\":\"$(cat userdata.b64)\"}" \
            --query "LaunchTemplateVersion.VersionNumber" \
            --output text)

          aws ec2 modify-launch-template \
            --launch-template-id "$LT_ID" \
            --default-version "$NEW"

          echo "LT version updated to $NEW"


      # ASG Instance Refresh 시작
      - name: Start Instance Refresh
        id: refresh
        run: |
          ID=$(aws autoscaling start-instance-refresh \
            --auto-scaling-group-name "$ASG_NAME" \
            --preferences "MinHealthyPercentage=${MIN_HEALTHY_PERCENT},InstanceWarmup=${INSTANCE_WARMUP}" \
            --query "InstanceRefreshId" \
            --output text)

          echo "id=$ID" >> "$GITHUB_OUTPUT"
          echo "Started refresh $ID"

      # Refresh 모니터링
      - name: Monitor Instance Refresh
        run: |
          set -euo pipefail
          ID="${{ steps.refresh.outputs.id }}"

          if [ -z "$ID" ]; then
            echo "Instance refresh id is empty"
            exit 1
          fi

          cancel_refresh() {
            echo "Requesting cancel for instance refresh: $ID"
            aws autoscaling cancel-instance-refresh \
              --auto-scaling-group-name "$ASG_NAME" \
              || echo "Cancel request failed or no active refresh"
          }

          # 워크플로우 취소/중단 시에도 최대한 refresh 취소 시도
          trap 'echo "Cancellation signal received"; cancel_refresh; exit 1' INT TERM

          for i in {1..90}; do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "$ASG_NAME" \
              --instance-refresh-ids "$ID" \
              --query "InstanceRefreshes[0].Status" \
              --output text)

            echo "Status: $STATUS"

            if [ "$STATUS" = "Successful" ]; then
              exit 0
            fi

            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              cancel_refresh
              exit 1
            fi

            sleep 20
          done

          echo "Timeout"
          cancel_refresh
          exit 1

      - name: Cancel Instance Refresh on failure/cancel
        if: ${{ failure() || cancelled() }}
        run: |
          set -euo pipefail
          ID="${{ steps.refresh.outputs.id }}"

          if [ -z "$ID" ]; then
            echo "No refresh id found. Skip cancel."
            exit 0
          fi

          STATUS=$(aws autoscaling describe-instance-refreshes \
            --auto-scaling-group-name "$ASG_NAME" \
            --instance-refresh-ids "$ID" \
            --query "InstanceRefreshes[0].Status" \
            --output text || echo "Unknown")

          echo "Current refresh status: $STATUS"
          if [ "$STATUS" = "InProgress" ] || [ "$STATUS" = "Pending" ]; then
            aws autoscaling cancel-instance-refresh \
              --auto-scaling-group-name "$ASG_NAME"
            echo "Cancel requested for refresh $ID"
          else
            echo "No active refresh to cancel"
          fi

      - name: Send Discord Notification
        if: failure()
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -H "Content-Type: application/json" \
               -X POST \
               -d "{\"content\": \"CD - AI 실패\n🔗 ${RUN_URL}\"}" \
               ${{ secrets.DISCORD_WEBHOOK_URL }}

name: CI - AI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

permissions:
  contents: read
  actions: write

jobs:
  ai-ci:
    runs-on: ubuntu-24.04-arm

    env:
      AWS_REGION: ap-northeast-2
      ECR_REPOSITORY: planit-ai

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Lock 검증 (develop/main 공통)
      # - pyproject.toml ↔ uv.lock 불일치 시 실패
      - name: Set up Python 3.11 (lock check)
        if: |
          startsWith(github.ref, 'refs/heads/develop') || github.base_ref == 'develop' ||
          startsWith(github.ref, 'refs/heads/main') || github.base_ref == 'main'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv (lock check)
        if: |
          startsWith(github.ref, 'refs/heads/develop') || github.base_ref == 'develop' ||
          startsWith(github.ref, 'refs/heads/main') || github.base_ref == 'main'
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Verify pyproject.toml matches uv.lock (frozen)
        if: |
          startsWith(github.ref, 'refs/heads/develop') || github.base_ref == 'develop' ||
          startsWith(github.ref, 'refs/heads/main') || github.base_ref == 'main'
        run: uv sync --frozen

      # =========================
      # develop: 기존 tar.gz 아티팩트 빌드
      # =========================
      - name: Build artifact tar.gz (develop path)
        if: startsWith(github.ref, 'refs/heads/develop') || github.base_ref == 'develop'
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist/planit-ai

          rsync -a . dist/planit-ai \
            --exclude ".env" \
            --exclude ".venv" \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "__pycache__" \
            --exclude ".pytest_cache" \
            --exclude ".mypy_cache" \
            --exclude "dist"

          tar -C dist -czf planit-ai.tar.gz planit-ai

      - name: Upload tar.gz (develop push only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
        uses: actions/upload-artifact@v4
        with:
          name: planit-ai-tar
          path: planit-ai.tar.gz
          retention-days: 7

      # =========================
      # main: Docker build/test + ECR push
      # =========================
      - name: Set up Docker Buildx (main path)
        if: startsWith(github.ref, 'refs/heads/main') || github.base_ref == 'main'
        uses: docker/setup-buildx-action@v3

      # Access Key 방식
      - name: Configure AWS credentials (Access Key) (main push only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR (main push only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image tags (main path)
        if: startsWith(github.ref, 'refs/heads/main') || github.base_ref == 'main'
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          SHA="${GITHUB_SHA}"
          SHORT="${SHA:0:7}"
          TS="$(date -u +%Y%m%d%H%M%S)"
          echo "sha_tag=sha-${SHORT}" >> "$GITHUB_OUTPUT"
          echo "ts_tag=ts-${TS}" >> "$GITHUB_OUTPUT"

      # PR / non-push: ARM 단일 빌드 (push 없음)
      - name: Build Docker image (main PR/non-push, arm64 only)
        if: (startsWith(github.ref, 'refs/heads/main') || github.base_ref == 'main') && !(github.event_name == 'push' && github.ref == 'refs/heads/main')
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: false
          tags: local/planit-ai:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=gha,scope=planit-ai-main
          cache-to: type=gha,mode=max,scope=planit-ai-main,ignore-error=true
          provenance: false
          sbom: false

      # main push: ARM 단일 빌드 + ECR push
      - name: Build & Push Docker image (main push, arm64 only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.sha_tag }}
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.ts_tag }}
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:prod
          cache-from: type=gha,scope=planit-ai-main
          cache-to: type=gha,mode=max,scope=planit-ai-main,ignore-error=true
          provenance: false
          sbom: false

      # =========================
      # Notification
      # =========================
      - name: Send Discord Notification
        if: failure()
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -H "Content-Type: application/json" \
               -X POST \
               -d "{\"content\": \"CI - AI 실패\n🔗 [로그 확인하기](${RUN_URL})\"}" \
               ${{ secrets.DISCORD_WEBHOOK_URL }}